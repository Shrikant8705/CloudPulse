<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudPulse - A Cloudburst Prediction System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gradient-to-br from-blue-900 via-blue-700 to-indigo-900 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <div class="text-center mb-12">
            <h1 class="text-6xl font-bold text-white mb-4">
                ⛈️ CloudPulse
            </h1>
            <p class="text-xl text-blue-100">AI-Powered Cloudburst Prediction System</p>
            <div class="mt-4 inline-flex items-center bg-green-500 text-white px-4 py-2 rounded-full">
                <span class="w-2 h-2 bg-white rounded-full mr-2 animate-pulse"></span>
                ML Model Active
            </div>
        </div>

        <!-- Input Card -->
        <div class="max-w-4xl mx-auto bg-white/95 backdrop-blur rounded-3xl shadow-2xl p-8 mb-8">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Weather Parameters</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Rainfall (mm)</label>
                    <input type="number" id="rainfall" value="50" 
                           class="w-full px-4 py-3 rounded-lg border-2 border-gray-200 focus:border-blue-500 focus:outline-none text-lg">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Humidity (%)</label>
                    <input type="number" id="humidity" value="85" 
                           class="w-full px-4 py-3 rounded-lg border-2 border-gray-200 focus:border-blue-500 focus:outline-none text-lg">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Pressure (hPa)</label>
                    <input type="number" id="pressure" value="1013" 
                           class="w-full px-4 py-3 rounded-lg border-2 border-gray-200 focus:border-blue-500 focus:outline-none text-lg">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Temperature (°C)</label>
                    <input type="number" id="temperature" value="25" 
                           class="w-full px-4 py-3 rounded-lg border-2 border-gray-200 focus:border-blue-500 focus:outline-none text-lg">
                </div>
            </div>

            <button onclick="predict()" 
                    class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-4 px-8 rounded-xl transition duration-200 transform hover:scale-105 text-lg">
                🔮 Predict Risk
            </button>
        </div>

        <!-- Results -->
        <div id="results" class="max-w-4xl mx-auto hidden">
            <!-- Rule-based Result -->
            <div id="ruleResult" class="bg-white/95 backdrop-blur rounded-3xl shadow-2xl p-8 mb-6"></div>
            <!-- ML Result -->
            <div id="mlResult" class="bg-gradient-to-r from-purple-500 to-indigo-600 text-white rounded-3xl shadow-2xl p-8"></div>
        </div>
    </div>

    <script>
        async function predict() {
            const rainfall = document.getElementById('rainfall').value;
            const humidity = document.getElementById('humidity').value;
            const pressure = document.getElementById('pressure').value;
            const temperature = document.getElementById('temperature').value;

            const response = await fetch(
                `http://localhost:8000/api/predict?rainfall=${rainfall}&humidity=${humidity}&pressure=${pressure}&temperature=${temperature}`
            );
            const data = await response.json();

            // Show results
            document.getElementById('results').classList.remove('hidden');

            // Rule-based result
            const ruleDiv = document.getElementById('ruleResult');
            const isHighRisk = data.rule_based.risk === 'HIGH';
            ruleDiv.className = `bg-white/95 backdrop-blur rounded-3xl shadow-2xl p-8 mb-6 border-4 ${isHighRisk ? 'border-red-500' : 'border-green-500'}`;
            ruleDiv.innerHTML = `
                <h3 class="text-xl font-bold mb-4">📊 Rule-Based Assessment</h3>
                <div class="text-4xl font-bold mb-2 ${isHighRisk ? 'text-red-600' : 'text-green-600'}">
                    ${data.rule_based.risk}
                </div>
                <p class="text-2xl">${data.rule_based.message}</p>
            `;

            // ML result
            const mlDiv = document.getElementById('mlResult');
            if (data.ml_prediction.available) {
                const prob = data.ml_prediction.probability.toFixed(1);
                mlDiv.innerHTML = `
                    <h3 class="text-2xl font-bold mb-4">CloudPulse Prediction</h3>
                    <div class="text-5xl font-bold mb-4">${data.ml_prediction.prediction}</div>
                    <div class="text-xl mb-4">Cloudburst Probability: ${prob}%</div>
                    <div class="w-full bg-white/30 rounded-full h-6 mb-4">
                        <div class="bg-white h-6 rounded-full transition-all duration-1000" style="width: ${prob}%"></div>
                    </div>
                    <div class="text-sm opacity-75">Model Confidence: ${data.ml_prediction.confidence.toFixed(1)}%</div>
                `;
            } else {
                mlDiv.innerHTML = `<p class="text-xl">⚠️ ML Model not available</p>`;
            }

            // Smooth scroll to results
            document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
