<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudPulse - Cloudburst Prediction</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-5xl font-bold text-indigo-900 mb-2">⛈️ CloudPulse</h1>
            <p class="text-gray-600">Real-time Cloudburst Prediction System</p>
        </div>

        <!-- City Selector -->
        <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-6 mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">Select Location</label>
            <select id="citySelect" class="w-full px-4 py-3 rounded-lg border-2 border-gray-200 focus:border-indigo-500 focus:outline-none">
                <option value="">Loading cities...</option>
            </select>
            
            <button id="checkBtn" class="w-full mt-4 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-lg transition duration-200">
                🔍 Check Risk
            </button>
        </div>

        <!-- Results (hidden initially) -->
        <div id="results" class="max-w-4xl mx-auto hidden">
            <!-- Weather Cards -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div class="bg-white rounded-xl shadow-lg p-6">
                    <div class="text-gray-500 text-sm mb-1">Rainfall</div>
                    <div id="rainfall" class="text-3xl font-bold text-blue-600">--</div>
                </div>
                <div class="bg-white rounded-xl shadow-lg p-6">
                    <div class="text-gray-500 text-sm mb-1">Humidity</div>
                    <div id="humidity" class="text-3xl font-bold text-cyan-600">--</div>
                </div>
                <div class="bg-white rounded-xl shadow-lg p-6">
                    <div class="text-gray-500 text-sm mb-1">Temperature</div>
                    <div id="temperature" class="text-3xl font-bold text-orange-600">--</div>
                </div>
            </div>

            <!-- Risk Alert -->
            <div id="riskAlert" class="mb-6"></div>

            <!-- Chart -->
            <div class="bg-white rounded-xl shadow-lg p-6">
                <h3 class="text-lg font-semibold mb-4">24-Hour Rainfall Trend</h3>
                <canvas id="chart" width="400" height="200"></canvas>
            </div>
        </div>

        <!-- Loading -->
        <div id="loading" class="text-center hidden">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
            <p class="mt-2 text-gray-600">Loading weather data...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
</body>
</html>
