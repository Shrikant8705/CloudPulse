<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudPulse - A Cloudburst Prediction</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <div class="text-center mb-12">
            <h1 class="text-6xl font-bold text-white mb-4 drop-shadow-2xl">
                ⛈️ CloudPulse
            </h1>
            <p class="text-xl text-gray-300 mb-4">A Cloudburst Prediction System</p>
            <div class="inline-flex items-center bg-green-500 text-white px-6 py-3 rounded-full shadow-lg">
                <span class="w-3 h-3 bg-white rounded-full mr-3 animate-pulse"></span>
                <span class="font-semibold">ML Model Active</span>
            </div>
        </div>

        <!-- City Selection Card -->
        <div class="max-w-3xl mx-auto bg-gray-800/90 backdrop-blur rounded-3xl shadow-2xl p-8 mb-8 border border-gray-700">
            <h2 class="text-3xl font-bold text-white mb-6 text-center">Select Your City</h2>
            
            <!-- Search Box -->
            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-300 mb-2">🔍 Search City</label>
                <input type="text" id="citySearch" placeholder="Type city name..."
                       class="w-full px-4 py-4 rounded-xl border-2 border-gray-600 bg-gray-700 text-white placeholder-gray-400 focus:border-blue-500 focus:outline-none text-lg">
            </div>

            <!-- City Dropdown -->
            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-300 mb-2">🏙️ Select City</label>
                <select id="citySelect" 
                        class="w-full px-4 py-4 rounded-xl border-2 border-gray-600 bg-gray-700 text-white focus:border-blue-500 focus:outline-none text-lg font-semibold">
                    <option value="">Loading cities...</option>
                </select>
            </div>

            <!-- Predict Button -->
            <button id="predictBtn"
                    class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white font-bold py-5 px-8 rounded-xl transition duration-300 transform hover:scale-105 shadow-xl text-xl">
                🔮 Get Prediction for This City
            </button>

            <!-- Stats -->
            <div class="mt-6 text-center text-sm text-gray-400">
                <span id="cityCount">Loading...</span> Indian cities available
            </div>
        </div>

        <!-- Loading Spinner -->
        <div id="loading" class="hidden text-center mb-8">
            <div class="inline-block animate-spin rounded-full h-16 w-16 border-b-4 border-blue-500"></div>
            <p class="text-white text-xl mt-4">Analyzing weather data...</p>
        </div>

        <!-- Results Container -->
        <div id="results" class="max-w-5xl mx-auto hidden">
            <!-- City Info Header -->
            <div class="bg-gray-800/90 backdrop-blur rounded-3xl shadow-2xl p-6 mb-6 border border-gray-700">
                <div class="flex items-center justify-between">
                    <div>
                        <h3 class="text-3xl font-bold text-white" id="cityName"></h3>
                        <p class="text-gray-400" id="cityRegion"></p>
                    </div>
                    <div class="text-right">
                        <p class="text-sm text-gray-400">Last Updated</p>
                        <p class="text-gray-300 font-semibold" id="lastUpdated"></p>
                    </div>
                </div>
            </div>

            <!-- Weather Cards -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                <div class="bg-blue-600 text-white rounded-2xl p-5 text-center">
                    <div class="text-4xl mb-2">🌧️</div>
                    <div class="text-sm opacity-75">Rainfall</div>
                    <div class="text-3xl font-bold" id="displayRainfall">--</div>
                </div>
                <div class="bg-cyan-600 text-white rounded-2xl p-5 text-center">
                    <div class="text-4xl mb-2">💧</div>
                    <div class="text-sm opacity-75">Humidity</div>
                    <div class="text-3xl font-bold" id="displayHumidity">--</div>
                </div>
                <div class="bg-orange-600 text-white rounded-2xl p-5 text-center">
                    <div class="text-4xl mb-2">🌡️</div>
                    <div class="text-sm opacity-75">Temperature</div>
                    <div class="text-3xl font-bold" id="displayTemp">--</div>
                </div>
                <div class="bg-purple-600 text-white rounded-2xl p-5 text-center">
                    <div class="text-4xl mb-2">🔽</div>
                    <div class="text-sm opacity-75">Pressure</div>
                    <div class="text-3xl font-bold" id="displayPressure">--</div>
                </div>
            </div>

            <!-- Predictions Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <!-- Rule-Based Result -->
                <div id="ruleResult" class="bg-gray-800/90 backdrop-blur rounded-3xl shadow-2xl p-8 border-4"></div>
                
                <!-- ML Result -->
                <div id="mlResult" class="bg-gradient-to-br from-purple-600 to-indigo-700 text-white rounded-3xl shadow-2xl p-8"></div>
            </div>

            <!-- Overall Risk Bar -->
            <div class="bg-gray-800/90 backdrop-blur rounded-3xl shadow-2xl p-8 border border-gray-700">
                <h3 class="text-2xl font-bold text-white mb-4 text-center">Overall Risk Assessment</h3>
                <div class="relative pt-1">
                    <div class="flex mb-2 items-center justify-between">
                        <div><span class="text-xs font-semibold text-green-400">SAFE</span></div>
                        <div><span class="text-xs font-semibold text-red-400">DANGER</span></div>
                    </div>
                    <div class="overflow-hidden h-6 mb-4 rounded-full bg-gray-700">
                        <div id="riskBar" style="width:0%" 
                             class="h-6 rounded-full bg-gradient-to-r from-green-400 via-yellow-400 to-red-600 transition-all duration-1000"></div>
                    </div>
                    <div class="text-center">
                        <span class="text-gray-300 text-sm">Risk Probability: <span id="riskPercentage" class="font-bold">0%</span></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="app.js"></script>
</body>
</html>
